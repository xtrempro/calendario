<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App de Turnos PRO</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="layout">

    <!-- ASIDE -->
    <aside class="sidebar">
        <h3>Perfiles</h3>

        <input id="newProfile" placeholder="Nuevo perfil">
        <select id="newProfileRole">
        <option value="Profesional">Profesional</option>
        <option value="Técnico">Técnico</option>
        <option value="Administrativo">Administrativo</option>
        <option value="Auxiliar">Auxiliar</option>
        </select>

        <select id="filterRole">
        <option value="Todos">Todos</option>
        <option value="Profesional">Profesional</option>
        <option value="Técnico">Técnico</option>
        <option value="Administrativo">Administrativo</option>
        <option value="Auxiliar">Auxiliar</option>
        </select>
        <button id="createProfile">Crear</button>

        <div id="profiles"></div>

        <hr>

        <label>
            <input type="checkbox" id="shiftAssigned">
            Asignación de Turno
        </label>

        <hr>

        <label>Valor Hora</label>
        <input id="valorHora" type="number" min="0" placeholder="Ej: 5000">

        <hr>

        <!-- NUEVO -->
        <button id="autoDiurnoBtn">Auto Diurno Año</button>
        <button id="autoCuartoBtn">Auto Cuarto Turno</button>

        <div id="selectorInfo" class="hidden infoBox">
            Selecciona en el calendario un turno de <b>Larga</b>, desde ese día se aplicará la secuencia de cuarto turno
        </div>

        <hr>

        <hr>

            <div class="panelBox">

            <b>Vacaciones / Ausencias</b><br><br>

            <button id="adminBtn">
            Permiso Administrativo
            </button>
            <button id="halfAdminMorningBtn">🌅 1/2 Administrativo Mañana</button>
            <button id="halfAdminAfternoonBtn">🌇 1/2 Administrativo Tarde</button>

            <button id="compBtn">
Feriado Compensatorio
</button>


<button id="legalBtn">
Feriado Legal
</button>

<button id="licenseBtn">
Licencia Médica
</button>



            <div id="adminInfo" class="hidden">
            Selecciona fecha inicio en calendario
            </div>

            </div>



        <div id="summary"></div>
    </aside>

    <!-- MAIN -->
<!-- MAIN -->
<main class="main">

    <!-- CALENDARIO -->
    <div class="card">
        <div class="header">

            <button id="prevBtn">◀</button>

            <button id="undoBtn" title="Deshacer">
        ↶
            </button>

            <h2 id="monthYear"></h2>

            <button id="redoBtn" title="Rehacer">
        ↷
            </button>

            <button id="nextBtn">▶</button>

    </div>

        <div class="weekdays">
            <div>Lun</div><div>Mar</div><div>Mié</div>
            <div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
        </div>

        <div class="grid" id="calendar"></div>
    </div>

    <!-- TIMELINE -->
    <div id="teamTimeline" class="card"></div>

    <!-- STAFFING -->
    <div id="staffingPanel" class="card staffing-panel">

        <h3>Dotación Requerida</h3>

        <div class="staff-grid">

            <div>
                <label>Profesional Hábil</label>
                <input id="cfg_Profesional_habil" type="number" min="0">
            </div>

            <div>
                <label>Profesional Inhábil</label>
                <input id="cfg_Profesional_inhabil" type="number" min="0">
            </div>

            <div>
                <label>Profesional Noche</label>
                <input id="cfg_Profesional_noche" type="number" min="0">
            </div>

            <div>
                <label>Técnico Hábil</label>
                <input id="cfg_Técnico_habil" type="number" min="0">
            </div>

            <div>
                <label>Técnico Inhábil</label>
                <input id="cfg_Técnico_inhabil" type="number" min="0">
            </div>

            <div>
                <label>Técnico Noche</label>
                <input id="cfg_Técnico_noche" type="number" min="0">
            </div>

            <div>
                <label>Administrativo Hábil</label>
                <input id="cfg_Administrativo_habil" type="number" min="0">
            </div>

            <div>
                <label>Administrativo Inhábil</label>
                <input id="cfg_Administrativo_inhabil" type="number" min="0">
            </div>

            <div>
                <label>Administrativo Noche</label>
                <input id="cfg_Administrativo_noche" type="number" min="0">
            </div>

            <div>
                <label>Auxiliar Hábil</label>
                <input id="cfg_Auxiliar_habil" type="number" min="0">
            </div>

            <div>
                <label>Auxiliar Inhábil</label>
                <input id="cfg_Auxiliar_inhabil" type="number" min="0">
            </div>

            <div>
                <label>Auxiliar Noche</label>
                <input id="cfg_Auxiliar_noche" type="number" min="0">
            </div>

        </div>

        <button id="saveStaffingBtn">Guardar Dotación</button>

        <div id="staffingResult"></div>

    </div>

    <div id="swapPanel" class="card">
    <h3>Cambio de Turnos</h3>

    <select id="swapFrom"></select>
    <select id="swapTo"></select>

    <div id="swapCalendar1"></div>

    <div id="swapCalendar2"></div>

    <button id="saveSwapBtn">
        Registrar Cambio
    </button>

    <div id="swapList"></div>
</div>

</main>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
